<html lang="ar" dir="rtl"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>امتحان السوق النظري - سيارة عمومية</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>🚕 امتحان السوق النظري</h1>
      <p class="subtitle">لفئة سيارة عمومية</p>
    </header>

    <div class="progress-bar">
      <div id="progress-fill" class="progress-fill"></div>
    </div>

    <main>
      <section id="quiz-card" class="card">
        <div id="question-number" class="question-number"></div>
        <h2 id="question-text" class="question-text"></h2>
        <div id="options-container" class="options-container"></div>
        <div id="feedback" class="feedback"></div>
      </section>

      <section id="result-card" class="card result-card hidden">
        <h2>🏁 انتهى الامتحان</h2>
        <div class="score-circle">
          <span id="score-percent">0%</span>
        </div>
        <p id="score-text" class="score-text"></p>
        <p id="result-message" class="result-message"></p>
        <button id="restart-btn" class="restart-btn">إعادة الاختبار 🔄</button>
      </section>
    </main>

    <footer class="app-footer">
      <p>عدد الأسئلة الكلي: <span id="total-count"></span></p>
    </footer>
  </div>

  <script src="script.js"></script>
  <script>
    document.getElementById("total-count").textContent = questions.length;
  </script>


</body></html>
